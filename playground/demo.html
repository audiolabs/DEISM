document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

    <a href=\"https://deism.readthedocs.io/\" target=\"_blank\" style=\"color:#525964;text-decoration:none\">Docs<\u002Fa>\n      <a href=\"https://doi.org/10.1121/10.0023935\" target=\"_blank\" style=\"color:#525964;text-decoration:none\">Paper<\u002Fa>\n      <button onclick=\"{{ openPlayground }}\" style=\"border:none;background:#14171C;color:#fff;font-family:inherit;font-weight:600;font-size:13.5px;padding:9px 18px;border-radius:9px;cursor:pointer;white-space:nowrap\">Open playground<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1180px;margin:0 auto;padding:46px 32px 30px;display:flex;gap:48px;align-items:center\">\n    <div style=\"flex:1;min-width:0\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#2D5BFF;margin-bottom:18px\">Diffraction-Enhanced Image Source Method<\u002Fdiv>\n      <h1 style=\"font-size:52px;line-height:1.04;letter-spacing:-.03em;font-weight:600;margin:0 0 18px\">Simulate sound between devices in any room.<\u002Fh1>\n      <p style=\"font-size:17px;line-height:1.6;color:#525964;margin:0 0 26px;max-width:520px\">DEISM models the room transfer function between directional transducers — capturing local diffraction and scattering around real devices like smart speakers and headsets. Shape a room and watch the response update, live.<\u002Fp>\n      <div style=\"display:flex;gap:12px;align-items:center\">\n        <button onclick=\"{{ openPlayground }}\" style=\"border:none;background:#2D5BFF;color:#fff;font-family:inherit;font-weight:600;font-size:15px;padding:13px 26px;border-radius:10px;cursor:pointer;white-space:nowrap\">Open the playground →<\u002Fbutton>\n        <a href=\"https://doi.org/10.1121/10.0023935\" target=\"_blank\" style=\"border:1px solid #D8DBE0;background:#fff;color:#14171C;font-family:inherit;font-weight:500;font-size:15px;padding:13px 26px;border-radius:10px;cursor:pointer;white-space:nowrap;text-decoration:none\">Read the paper<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:26px;margin-top:34px;font-family:'IBM Plex Mono',monospace\">\n        <div><div style=\"font-size:22px;font-weight:500\">{{ stats.nImages }}<\u002Fdiv><div style=\"font-size:11px;color:#9aa0a8;margin-top:2px\">image sources<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:22px;font-weight:500\">{{ stats.t60 }}<\u002Fdiv><div style=\"font-size:11px;color:#9aa0a8;margin-top:2px\">est. T60<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:22px;font-weight:500\">{{ stats.direct }}<\u002Fdiv><div style=\"font-size:11px;color:#9aa0a8;margin-top:2px\">direct delay<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:none;width:480px\">\n      <div style=\"background:#0E1116;border-radius:18px;height:330px;position:relative;overflow:hidden;box-shadow:0 24px 60px -20px rgba(20,23,28,.45)\">\n        <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:30px 30px\"><\u002Fdiv>\n        <canvas ref=\"{{ sceneRefL }}\" style=\"position:absolute;inset:0;width:100%;height:100%\"><\u002Fcanvas>\n        <div style=\"position:absolute;top:14px;left:14px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#cdd2da;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:4px 9px\">{{ roomLabel }}<\u002Fdiv>\n        <div style=\"position:absolute;bottom:14px;right:14px;display:flex;gap:12px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#aeb4bc\"><span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#2D5BFF\"><\u002Fspan>Source<\u002Fspan><span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#FF6A45\"><\u002Fspan>Receiver<\u002Fspan><\u002Fdiv>\n        <div style=\"position:absolute;bottom:14px;left:14px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:#6b7280;max-width:215px;line-height:1.45\">Illustrative image-source preview — not the exact diffraction-enhanced DEISM output<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1180px;margin:0 auto;padding:30px 32px 80px;display:flex;gap:40px;align-items:flex-start\">\n    <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:14px\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:#9aa0a8;margin-bottom:2px\">HOW IT WORKS<\u002Fdiv>\n\n      <div style=\"border:1px solid #2D5BFF;border-radius:16px;padding:22px;background:#F5F8FF\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:7px\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#2D5BFF\">01<\u002Fspan><span style=\"font-size:17px;font-weight:600\">Define the room<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:13.5px;color:#525964;margin:0 0 16px;line-height:1.55\">Shoebox or convex geometry. Adjust dimensions and the image-source cloud rebuilds instantly.<\u002Fp>\n        <div style=\"display:flex;gap:5px;margin-bottom:18px;background:#fff;border:1px solid #E3E6EB;border-radius:10px;padding:4px;width:max-content;font-size:13px;font-weight:500\">\n          <button onclick=\"{{ on.roomShoebox }}\" style=\"{{ seg.lShoebox }}\">Shoebox<\u002Fbutton>\n          <button onclick=\"{{ on.roomConvex }}\" style=\"{{ seg.lConvex }}\">Convex<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ isShoebox }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:15px\">\n          <div><div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#525964;margin-bottom:7px\">Length<span style=\"font-family:'IBM Plex Mono',monospace;color:#14171C\">{{ fmt.L }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"2.5\" max=\"8\" step=\"0.1\" value=\"{{ L }}\" oninput=\"{{ on.L }}\" style=\"width:100%\"><\u002Fdiv>\n          <div><div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#525964;margin-bottom:7px\">Width<span style=\"font-family:'IBM Plex Mono',monospace;color:#14171C\">{{ fmt.W }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"2\" max=\"6\" step=\"0.1\" value=\"{{ W }}\" oninput=\"{{ on.W }}\" style=\"width:100%\"><\u002Fdiv>\n          <div><div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#525964;margin-bottom:7px\">Height<span style=\"font-family:'IBM Plex Mono',monospace;color:#14171C\">{{ fmt.H }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"2.2\" max=\"4\" step=\"0.1\" value=\"{{ H }}\" oninput=\"{{ on.H }}\" style=\"width:100%\"><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isConvex }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:13px;color:#525964;line-height:1.55;background:#fff;border:1px solid #E3E6EB;border-radius:12px;padding:14px\">Convex room with a sloped ceiling. <strong style=\"color:#14171C;font-weight:500\">Tune each vertex<\u002Fstrong> — chips, sliders, or drag points in 3D — inside the playground. <button onclick=\"{{ stepFns.s1 }}\" style=\"border:none;background:none;color:#2D5BFF;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:0;margin-top:8px;display:block\">Open vertex editor →<\u002Fbutton><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ stepFns.s2 }}\" style=\"text-align:left;border:1px solid #EDEFF2;background:#fff;border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:13px;cursor:pointer;font-family:inherit\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9aa0a8\">02<\u002Fspan><span style=\"font-size:16px;font-weight:600\">Wall materials<\u002Fspan><span style=\"margin-left:auto;font-size:12.5px;color:#8a8f98;font-family:'IBM Plex Mono',monospace\">absorption →<\u002Fspan><\u002Fbutton>\n      <button onclick=\"{{ stepFns.s3 }}\" style=\"text-align:left;border:1px solid #EDEFF2;background:#fff;border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:13px;cursor:pointer;font-family:inherit\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9aa0a8\">03<\u002Fspan><span style=\"font-size:16px;font-weight:600\">Source &amp; receiver<\u002Fspan><span style=\"margin-left:auto;font-size:12.5px;color:#8a8f98;font-family:'IBM Plex Mono',monospace\">position →<\u002Fspan><\u002Fbutton>\n      <button onclick=\"{{ stepFns.s4 }}\" style=\"text-align:left;border:1px solid #EDEFF2;background:#fff;border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:13px;cursor:pointer;font-family:inherit\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9aa0a8\">04<\u002Fspan><span style=\"font-size:16px;font-weight:600\">Directivity<\u002Fspan><span style=\"margin-left:auto;font-size:12.5px;color:#8a8f98;font-family:'IBM Plex Mono',monospace\">3D · monopole / device →<\u002Fspan><\u002Fbutton>\n      <button onclick=\"{{ stepFns.s5 }}\" style=\"text-align:left;border:1px solid #EDEFF2;background:#fff;border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:13px;cursor:pointer;font-family:inherit\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9aa0a8\">05<\u002Fspan><span style=\"font-size:16px;font-weight:600\">Method &amp; run<\u002Fspan><span style=\"margin-left:auto;font-size:12.5px;color:#8a8f98;font-family:'IBM Plex Mono',monospace\">ORG / LC / MIX →<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"flex:none;width:440px;position:sticky;top:24px;display:flex;flex-direction:column;gap:14px\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:#9aa0a8\">LIVE RESPONSE<\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ECEEF1;border-radius:14px;padding:14px\"><div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\"><span style=\"font-size:12.5px;font-weight:600\">Impulse response<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#9aa0a8\">RIR<\u002Fspan><\u002Fdiv><canvas ref=\"{{ rirRefL }}\" style=\"width:100%;height:64px;display:block\"><\u002Fcanvas><div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;color:#b3b8be;margin-top:6px;line-height:1.45\">Geometric image-source model · illustrative, not the strict DEISM RIR<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ECEEF1;border-radius:14px;padding:14px\"><div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\"><span style=\"font-size:12.5px;font-weight:600\">Transfer function<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#9aa0a8\">RTF · dB<\u002Fspan><\u002Fdiv><canvas ref=\"{{ rtfRefL }}\" style=\"width:100%;height:80px;display:block\"><\u002Fcanvas><div style=\"display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9px;color:#b3b8be;margin-top:4px\"><span>20 Hz<\u002Fspan><span>200<\u002Fspan><span>2 k<\u002Fspan><span>20 k<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#0E1116;border:1px solid #ECEEF1;border-radius:14px;padding:14px;display:flex;align-items:center;gap:16px\"><canvas ref=\"{{ dirRefL }}\" style=\"width:118px;height:118px;flex:none\"><\u002Fcanvas><div><div style=\"font-size:12.5px;font-weight:600;margin-bottom:5px;color:#fff\">3D directivity<\u002Fdiv><div style=\"font-size:11.5px;color:#aab0b8;line-height:1.5\">Spherical-harmonic pattern around the source. Frequency-dependent — sweep it in the playground.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ====================== PLAYGROUND ====================== -->\n<sc-if value=\"{{ isPlayground }}\" hint-placeholder-val=\"{{ true }}\">\n<div data-screen-label=\"Playground\" style=\"height:100vh;background:#0E1116;position:relative;overflow:hidden;color:#fff\">\n  <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:34px 34px\"><\u002Fdiv>\n  <canvas ref=\"{{ sceneRef }}\" onpointerdown=\"{{ on.scenePD }}\" onpointermove=\"{{ on.scenePM }}\" onpointerup=\"{{ on.scenePU }}\" onpointerleave=\"{{ on.scenePU }}\" style=\"position:absolute;inset:0;width:100%;height:100%;touch-action:none\"><\u002Fcanvas>\n\n  <div style=\"position:absolute;top:20px;left:20px;background:rgba(20,23,28,.62);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:15px;padding:15px 17px;width:354px\">\n    <div style=\"display:flex;align-items:center;gap:9px;font-weight:600;font-size:15px;margin-bottom:14px\">\n      <button onclick=\"{{ goLanding }}\" title=\"Back to home\" style=\"width:20px;height:20px;border:none;border-radius:6px;background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0\"><span style=\"width:7px;height:7px;border-radius:50%;background:#2D5BFF\"><\u002Fspan><\u002Fbutton>\n      DEISM <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a909a;font-weight:400\">playground<\u002Fspan>\n      <span style=\"margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a909a\">{{ stats.method }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:3px;font-family:'IBM Plex Mono',monospace;font-size:10.5px\">\n      <button onclick=\"{{ stepFns.s1 }}\" style=\"{{ pstep.s1 }}\">Room<\u002Fbutton><span style=\"color:#5b626c\">›<\u002Fspan>\n      <button onclick=\"{{ stepFns.s2 }}\" style=\"{{ pstep.s2 }}\">Material<\u002Fbutton><span style=\"color:#5b626c\">›<\u002Fspan>\n      <button onclick=\"{{ stepFns.s3 }}\" style=\"{{ pstep.s3 }}\">Src/Rcv<\u002Fbutton><span style=\"color:#5b626c\">›<\u002Fspan>\n      <button onclick=\"{{ stepFns.s4 }}\" style=\"{{ pstep.s4 }}\">Dir<\u002Fbutton><span style=\"color:#5b626c\">›<\u002Fspan>\n      <button onclick=\"{{ stepFns.s5 }}\" style=\"{{ pstep.s5 }}\">Run<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute;top:20px;right:20px;display:flex;background:rgba(20,23,28,.62);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:4px;font-size:12.5px;font-weight:500\">\n    <button onclick=\"{{ on.roomShoebox }}\" style=\"{{ seg.pShoebox }}\">Shoebox<\u002Fbutton>\n    <button onclick=\"{{ on.roomConvex }}\" style=\"{{ seg.pConvex }}\">Convex<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute;top:118px;left:20px;width:300px;max-height:calc(100vh - 290px);overflow:auto;background:rgba(20,23,28,.62);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:15px;padding:18px\">\n\n    <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n      <sc-if value=\"{{ isShoebox }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#8a909a;margin-bottom:16px\">01 · ROOM DIMENSIONS<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px\">\n          <div><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:8px\">Length<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ fmt.L }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"2.5\" max=\"8\" step=\"0.1\" value=\"{{ L }}\" oninput=\"{{ on.L }}\" style=\"width:100%\"><\u002Fdiv>\n          <div><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:8px\">Width<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ fmt.W }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"2\" max=\"6\" step=\"0.1\" value=\"{{ W }}\" oninput=\"{{ on.W }}\" style=\"width:100%\"><\u002Fdiv>\n          <div><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:8px\">Height<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ fmt.H }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"2.2\" max=\"4\" step=\"0.1\" value=\"{{ H }}\" oninput=\"{{ on.H }}\" style=\"width:100%\"><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6f7680;padding-top:4px;border-top:1px solid rgba(255,255,255,.08)\">Volume {{ stats.volume }} · drag the view to orbit<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isConvex }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;margin-bottom:14px\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#8a909a\">01 · ROOM VERTICES<\u002Fspan><button onclick=\"{{ resetVerts }}\" style=\"margin-left:auto;border:1px solid rgba(255,255,255,.16);background:transparent;color:#aab0b8;font-family:inherit;font-size:10.5px;padding:4px 9px;border-radius:7px;cursor:pointer\">Reset<\u002Fbutton><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px\">\n          <button onclick=\"{{ vFns.v0 }}\" style=\"{{ vchip.v0 }}\">V1<\u002Fbutton><button onclick=\"{{ vFns.v1 }}\" style=\"{{ vchip.v1 }}\">V2<\u002Fbutton><button onclick=\"{{ vFns.v2 }}\" style=\"{{ vchip.v2 }}\">V3<\u002Fbutton><button onclick=\"{{ vFns.v3 }}\" style=\"{{ vchip.v3 }}\">V4<\u002Fbutton><button onclick=\"{{ vFns.v4 }}\" style=\"{{ vchip.v4 }}\">V5<\u002Fbutton><button onclick=\"{{ vFns.v5 }}\" style=\"{{ vchip.v5 }}\">V6<\u002Fbutton><button onclick=\"{{ vFns.v6 }}\" style=\"{{ vchip.v6 }}\">V7<\u002Fbutton><button onclick=\"{{ vFns.v7 }}\" style=\"{{ vchip.v7 }}\">V8<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px\">\n          <div><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:7px\">Vertex X<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ vfmt.x }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"0\" max=\"8\" step=\"0.1\" value=\"{{ vert.x }}\" oninput=\"{{ on.vx }}\" style=\"width:100%\"><\u002Fdiv>\n          <div><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:7px\">Vertex Y<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ vfmt.y }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"0\" max=\"6\" step=\"0.1\" value=\"{{ vert.y }}\" oninput=\"{{ on.vy }}\" style=\"width:100%\"><\u002Fdiv>\n          <div><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:7px\">Vertex Z<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ vfmt.z }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"0\" max=\"4\" step=\"0.1\" value=\"{{ vert.z }}\" oninput=\"{{ on.vz }}\" style=\"width:100%\"><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6f7680;padding-top:4px;border-top:1px solid rgba(255,255,255,.08);line-height:1.5\">Vol {{ stats.volume }} · drag white handles in 3D to reshape<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isStep2 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#8a909a;margin-bottom:16px\">02 · WALL MATERIALS<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px\">\n        <button onclick=\"{{ on.matAnechoic }}\" style=\"{{ mat.anechoic }}\">Anechoic<\u002Fbutton>\n        <button onclick=\"{{ on.matStudio }}\" style=\"{{ mat.studio }}\">Studio<\u002Fbutton>\n        <button onclick=\"{{ on.matLiving }}\" style=\"{{ mat.living }}\">Living room<\u002Fbutton>\n        <button onclick=\"{{ on.matReverb }}\" style=\"{{ mat.reverb }}\">Reverberant<\u002Fbutton>\n      <\u002Fdiv>\n      <div><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:8px\">Mean absorption α<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ fmt.abs }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"0.03\" max=\"0.95\" step=\"0.01\" value=\"{{ absorption }}\" oninput=\"{{ on.abs }}\" style=\"width:100%\"><\u002Fdiv>\n      <div style=\"margin-top:14px;display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#aab0b8\"><span>Estimated T60<\u002Fspan><span style=\"color:#fff\">{{ stats.t60 }}<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:8px;font-size:10.5px;color:#6f7680;line-height:1.5\">Angle- &amp; frequency-dependent wall impedance is supported in the full solver.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isStep3 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#8a909a;margin-bottom:14px\">03 · SOURCE &amp; RECEIVER<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;margin-bottom:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#2D5BFF\"><\u002Fspan>Source <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:400;color:#8a909a;font-size:10px\">m<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:8px;margin-bottom:16px\">\n        <div style=\"flex:1\"><div style=\"font-size:10px;color:#8a909a;margin-bottom:4px\">X {{ fmt.srcX }}<\u002Fdiv><input type=\"range\" min=\"0.1\" max=\"{{ srcXMax }}\" step=\"0.05\" value=\"{{ src.x }}\" oninput=\"{{ on.srcX }}\" style=\"width:100%\"><\u002Fdiv>\n        <div style=\"flex:1\"><div style=\"font-size:10px;color:#8a909a;margin-bottom:4px\">Y {{ fmt.srcY }}<\u002Fdiv><input type=\"range\" min=\"0.1\" max=\"{{ srcYMax }}\" step=\"0.05\" value=\"{{ src.y }}\" oninput=\"{{ on.srcY }}\" style=\"width:100%\"><\u002Fdiv>\n        <div style=\"flex:1\"><div style=\"font-size:10px;color:#8a909a;margin-bottom:4px\">Z {{ fmt.srcZ }}<\u002Fdiv><input type=\"range\" min=\"0.1\" max=\"{{ srcZMax }}\" step=\"0.05\" value=\"{{ src.z }}\" oninput=\"{{ on.srcZ }}\" style=\"width:100%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;margin-bottom:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#FF6A45\"><\u002Fspan>Receiver<\u002Fdiv>\n      <div style=\"display:flex;gap:8px\">\n        <div style=\"flex:1\"><div style=\"font-size:10px;color:#8a909a;margin-bottom:4px\">X {{ fmt.recX }}<\u002Fdiv><input type=\"range\" min=\"0.1\" max=\"{{ recXMax }}\" step=\"0.05\" value=\"{{ rec.x }}\" oninput=\"{{ on.recX }}\" style=\"width:100%;accent-color:#FF6A45\"><\u002Fdiv>\n        <div style=\"flex:1\"><div style=\"font-size:10px;color:#8a909a;margin-bottom:4px\">Y {{ fmt.recY }}<\u002Fdiv><input type=\"range\" min=\"0.1\" max=\"{{ recYMax }}\" step=\"0.05\" value=\"{{ rec.y }}\" oninput=\"{{ on.recY }}\" style=\"width:100%;accent-color:#FF6A45\"><\u002Fdiv>\n        <div style=\"flex:1\"><div style=\"font-size:10px;color:#8a909a;margin-bottom:4px\">Z {{ fmt.recZ }}<\u002Fdiv><input type=\"range\" min=\"0.1\" max=\"{{ recZMax }}\" step=\"0.05\" value=\"{{ rec.z }}\" oninput=\"{{ on.recZ }}\" style=\"width:100%;accent-color:#FF6A45\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px;font-size:10.5px;color:#6f7680;line-height:1.5\">Tip: drag the dots directly in the 3D view.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isStep4 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#8a909a;margin-bottom:12px\">04 · DIRECTIVITY · 3D<\u002Fdiv>\n      <div style=\"display:flex;gap:5px;background:rgba(255,255,255,.07);border-radius:9px;padding:4px;margin-bottom:12px;font-size:12px;font-weight:500\">\n        <button onclick=\"{{ on.dirSource }}\" style=\"{{ dv.source }}\">Source<\u002Fbutton>\n        <button onclick=\"{{ on.dirReceiver }}\" style=\"{{ dv.receiver }}\">Receiver<\u002Fbutton>\n      <\u002Fdiv>\n      <canvas ref=\"{{ dirRef }}\" style=\"width:100%;height:172px;display:block;margin-bottom:12px\"><\u002Fcanvas>\n      <div style=\"margin-bottom:12px\">\n        <select value=\"{{ activeDirType }}\" onchange=\"{{ on.activeDir }}\" style=\"width:100%;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.16);border-radius:8px;padding:8px 10px;font-size:12.5px\">\n          <option value=\"monopole\" style=\"color:#14171C\">Monopole (analytic)<\u002Foption>\n          <option value=\"speaker\" style=\"color:#14171C\">Cuboid speaker (measured)<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:12px\"><div style=\"display:flex;justify-content:space-between;font-size:11px;color:#aab0b8;margin-bottom:7px\">Inspect frequency<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ fmt.dirFreq }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"100\" max=\"8000\" step=\"50\" value=\"{{ dirFreq }}\" oninput=\"{{ on.dirFreq }}\" style=\"width:100%\"><\u002Fdiv>\n      <div><div style=\"display:flex;justify-content:space-between;font-size:11px;color:#aab0b8;margin-bottom:7px\">Facing<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ fmt.activeOrient }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"0\" max=\"360\" step=\"5\" value=\"{{ activeOrient }}\" oninput=\"{{ on.activeOrient }}\" style=\"width:100%\"><\u002Fdiv>\n      <div style=\"margin-top:12px;font-size:10.5px;color:#6f7680;line-height:1.5\">Pattern is frequency-dependent — higher frequencies form a tighter forward lobe. Monopole stays omnidirectional.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isStep5 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#8a909a;margin-bottom:14px\">05 · METHOD &amp; RUN<\u002Fdiv>\n      <div style=\"font-size:11px;color:#aab0b8;margin-bottom:8px\">DEISM variant<\u002Fdiv>\n      <div style=\"display:flex;gap:5px;background:rgba(255,255,255,.07);border-radius:9px;padding:4px;margin-bottom:16px;font-size:12px;font-weight:500\">\n        <button onclick=\"{{ on.methodORG }}\" style=\"{{ mth.ORG }}\">ORG<\u002Fbutton>\n        <button onclick=\"{{ on.methodLC }}\" style=\"{{ mth.LC }}\">LC<\u002Fbutton>\n        <button onclick=\"{{ on.methodMIX }}\" style=\"{{ mth.MIX }}\">MIX<\u002Fbutton>\n      <\u002Fdiv>\n      <div><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:8px\">Reflection order<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ order }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"1\" max=\"5\" step=\"1\" value=\"{{ order }}\" oninput=\"{{ on.order }}\" style=\"width:100%\"><\u002Fdiv>\n      <div style=\"margin:14px 0;display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#aab0b8\"><span>Images<\u002Fspan><span style=\"color:#fff\">{{ stats.nImages }}<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-bottom:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:#8a909a;margin-bottom:12px\">FREQUENCY GRID · update_freqs<\u002Fdiv>\n        <div style=\"margin-bottom:13px\"><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:7px\">Lower bound<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ fmt.fmin }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"20\" max=\"1000\" step=\"5\" value=\"{{ fmin }}\" oninput=\"{{ on.fmin }}\" style=\"width:100%\"><\u002Fdiv>\n        <div style=\"margin-bottom:13px\"><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:7px\">Upper bound<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ fmt.fmax }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"1000\" max=\"20000\" step=\"100\" value=\"{{ fmax }}\" oninput=\"{{ on.fmax }}\" style=\"width:100%\"><\u002Fdiv>\n        <div><div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#aab0b8;margin-bottom:7px\">Resolution<span style=\"font-family:'IBM Plex Mono',monospace;color:#fff\">{{ fmt.nFreq }} bins<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"32\" max=\"400\" step=\"8\" value=\"{{ nFreq }}\" oninput=\"{{ on.nFreq }}\" style=\"width:100%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:10.5px;color:#6f7680;line-height:1.5;margin-bottom:14px\">{{ methodNote }}<\u002Fdiv>\n      <button onclick=\"{{ run }}\" style=\"width:100%;border:none;background:#2D5BFF;color:#fff;font-family:inherit;font-weight:600;font-size:14px;padding:12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px\">{{ runLabel }}<\u002Fbutton>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute;bottom:20px;left:336px;right:140px;background:rgba(20,23,28,.66);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:15px;padding:15px 18px\">\n    <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:11px;font-family:'IBM Plex Mono',monospace;font-size:11px\">\n      <button onclick=\"{{ on.tabRIR }}\" style=\"{{ tabs.rir }}\">RIR<\u002Fbutton>\n      <button onclick=\"{{ on.tabRTF }}\" style=\"{{ tabs.rtf }}\">RTF<\u002Fbutton>\n      <span style=\"margin-left:auto;color:#8a909a\">{{ dockLabel }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:7px\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;color:#6b727d;margin-right:2px\">PIPELINE<\u002Fspan>\n      <sc-for list=\"{{ solveSteps }}\" as=\"st\" hint-placeholder-count=\"6\"><span style=\"{{ st.style }}\">{{ st.label }}<\u002Fspan><\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"font-size:10.5px;line-height:1.5;color:#9aa0aa;margin-bottom:11px;min-height:16px\">{{ runExplain }}<\u002Fdiv>\n    <canvas ref=\"{{ dockRef }}\" style=\"width:100%;height:128px;display:block\"><\u002Fcanvas>\n  <\u002Fdiv>\n\n  <button onclick=\"{{ run }}\" style=\"position:absolute;bottom:20px;right:20px;width:100px;height:100px;border-radius:50%;border:none;background:#2D5BFF;color:#fff;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 14px 36px -8px rgba(45,91,255,.55)\"><span style=\"font-size:24px;line-height:1\">▸<\u002Fspan>{{ runWord }}<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    view: 'landing', step: 1, roomType: 'shoebox',\n    L: 4.0, W: 3.0, H: 2.5,\n    verts: [\n      { x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: 3.5 }, { x: 0, y: 3, z: 2.5 }, { x: 0, y: 3, z: 0 },\n      { x: 4, y: 0, z: 0 }, { x: 4, y: 0, z: 3.5 }, { x: 4, y: 3, z: 2.5 }, { x: 4, y: 3, z: 0 },\n    ],\n    selVert: 5,\n    src: { x: 1.1, y: 1.1, z: 1.3 },\n    rec: { x: 2.9, y: 1.9, z: 1.3 },\n    order: 3, absorption: 0.25, method: 'MIX',\n    srcDir: 'speaker', recDir: 'monopole', srcOrient: 0, recOrient: 180,\n    dirView: 'source', dirFreq: 2000,\n    fmin: 20, fmax: 20000, nFreq: 150,\n    tab: 'rir', az: -0.7, running: false, solveStep: 0,\n  };\n\n  C = 343; el = 0.58;\n  CONVEX_EDGES = [[0,4],[4,7],[7,3],[3,0],[1,5],[5,6],[6,2],[2,1],[0,1],[4,5],[7,6],[3,2]];\n  CONVEX_FACEIDX = [[0,1,2,3],[4,5,6,7],[0,1,5,4],[3,2,6,7],[0,3,7,4],[1,2,6,5]];\n\n  sceneRefL = React.createRef(); rirRefL = React.createRef(); rtfRefL = React.createRef(); dirRefL = React.createRef();\n  sceneRef = React.createRef(); dockRef = React.createRef(); dirRef = React.createRef();\n  _proj = null; _drag = null; _runT = 1; _dirAz = 0;\n\n  componentDidMount() {\n    this._onResize = () => this.drawAll();\n    window.addEventListener('resize', this._onResize);\n    this.drawAll();\n    setTimeout(() => this.drawAll(), 250);\n    const spin = () => { this._dirAz += 0.012; this.drawDirOnly(); this._raf = requestAnimationFrame(spin); };\n    this._raf = requestAnimationFrame(spin);\n  }\n  componentDidUpdate() { this.drawAll(); }\n  componentWillUnmount() { window.removeEventListener('resize', this._onResize); cancelAnimationFrame(this._raf); }\n\n  defaultVerts() {\n    return [\n      { x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: 3.5 }, { x: 0, y: 3, z: 2.5 }, { x: 0, y: 3, z: 0 },\n      { x: 4, y: 0, z: 0 }, { x: 4, y: 0, z: 3.5 }, { x: 4, y: 3, z: 2.5 }, { x: 4, y: 3, z: 0 },\n    ];\n  }\n\n  // ---------- geometry ----------\n  geometry() {\n    const s = this.state;\n    if (s.roomType === 'shoebox') {\n      const { L, W, H } = s;\n      const c = [\n        { x: 0, y: 0, z: 0 }, { x: L, y: 0, z: 0 }, { x: L, y: W, z: 0 }, { x: 0, y: W, z: 0 },\n        { x: 0, y: 0, z: H }, { x: L, y: 0, z: H }, { x: L, y: W, z: H }, { x: 0, y: W, z: H },\n      ];\n      return { corners: c, edges: [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]], floor: [0,1,2,3], faceIdx: [[0,1,2,3],[1,2,6,5],[3,2,6,7],[0,1,5,4],[0,3,7,4],[4,5,6,7]] };\n    } else {\n      const c = s.verts.map(v => ({ ...v }));\n      const faces = this.CONVEX_FACEIDX.map(f => {\n        const a = c[f[0]], b = c[f[1]], d = c[f[2]];\n        const u = { x: b.x-a.x, y: b.y-a.y, z: b.z-a.z }, w = { x: d.x-a.x, y: d.y-a.y, z: d.z-a.z };\n        let n = { x: u.y*w.z-u.z*w.y, y: u.z*w.x-u.x*w.z, z: u.x*w.y-u.y*w.x };\n        const m = Math.hypot(n.x, n.y, n.z) || 1; n = { x: n.x/m, y: n.y/m, z: n.z/m };\n        const cen = { x: (c[f[0]].x+c[f[1]].x+c[f[2]].x+c[f[3]].x)/4, y: (c[f[0]].y+c[f[1]].y+c[f[2]].y+c[f[3]].y)/4, z: (c[f[0]].z+c[f[1]].z+c[f[2]].z+c[f[3]].z)/4 };\n        return { n, cen };\n      });\n      return { corners: c, edges: this.CONVEX_EDGES, floor: [0,3,7,4], faceIdx: this.CONVEX_FACEIDX, faces };\n    }\n  }\n\n  bounds() {\n    const c = this.geometry().corners;\n    let mn = { x: 1e9, y: 1e9, z: 1e9 }, mx = { x: -1e9, y: -1e9, z: -1e9 };\n    c.forEach(p => { mn.x = Math.min(mn.x, p.x); mn.y = Math.min(mn.y, p.y); mn.z = Math.min(mn.z, p.z); mx.x = Math.max(mx.x, p.x); mx.y = Math.max(mx.y, p.y); mx.z = Math.max(mx.z, p.z); });\n    return { mn, mx };\n  }\n  center() { const b = this.bounds(); return { x: (b.mn.x+b.mx.x)/2, y: (b.mn.y+b.mx.y)/2, z: (b.mn.z+b.mx.z)/2 }; }\n\n  volArea(g) {\n    const c = g.corners; let V = 0, S = 0;\n    g.faceIdx.forEach(id => {\n      [[id[0],id[1],id[2]],[id[0],id[2],id[3]]].forEach(tr => {\n        const a = c[tr[0]], b = c[tr[1]], d = c[tr[2]];\n        V += (a.x*(b.y*d.z-b.z*d.y) - a.y*(b.x*d.z-b.z*d.x) + a.z*(b.x*d.y-b.y*d.x)) / 6;\n        const u = { x: b.x-a.x, y: b.y-a.y, z: b.z-a.z }, w = { x: d.x-a.x, y: d.y-a.y, z: d.z-a.z };\n        const cr = { x: u.y*w.z-u.z*w.y, y: u.z*w.x-u.x*w.z, z: u.x*w.y-u.y*w.x };\n        S += Math.hypot(cr.x, cr.y, cr.z) / 2;\n      });\n    });\n    return { V: Math.abs(V), S };\n  }\n\n  // ---------- images / RIR / RTF ----------\n  // ---- DEISM workflow stages (real method names) ----\n  STAGES = [\n    { key: 'room',            label: 'update_room',            grp: 'room' },\n    { key: 'materials',       label: 'update_wall_materials',  grp: 'materials' },\n    { key: 'freqs',           label: 'update_freqs',           grp: 'freqs' },\n    { key: 'source_receiver', label: 'update_source_receiver', grp: 'source_receiver' },\n    { key: 'directivities',   label: 'update_directivities',   grp: 'directivities' },\n  ];\n  GRP_NAMES = { room: 'room geometry', materials: 'wall materials', freqs: 'frequency grid', source_receiver: 'source / receiver', directivities: 'directivity' };\n\n  // signature per parameter group; a change here marks the matching stage stale\n  groupSigs() {\n    const s = this.state;\n    return {\n      room: JSON.stringify([s.roomType, s.L, s.W, s.H, s.verts]),\n      materials: JSON.stringify([s.absorption]),\n      freqs: JSON.stringify([s.fmin, s.fmax, s.nFreq]),\n      source_receiver: JSON.stringify([s.src, s.rec, s.order]),\n      directivities: JSON.stringify([s.srcDir, s.recDir, s.srcOrient, s.recOrient, s.method]),\n    };\n  }\n  // which groups changed since the last successful Run\n  dirtyRoots() {\n    const cur = this.groupSigs(), snap = this._snap; const out = new Set();\n    for (const k in cur) if (!snap || snap[k] !== cur[k]) out.add(k);\n    return out;\n  }\n  // cascade stale roots downstream per the DEISM dependency chain (shoebox vs convex differ)\n  dirtySet() {\n    const out = new Set(this.dirtyRoots());\n    const convex = this.state.roomType === 'convex';\n    if (out.has('room'))      { out.add('materials'); out.add('freqs'); out.add('source_receiver'); out.add('directivities'); }\n    if (out.has('materials')) { out.add('freqs'); out.add('source_receiver'); out.add('directivities'); }\n    if (out.has('freqs'))     { out.add('directivities'); if (convex) out.add('source_receiver'); }\n    if (out.has('source_receiver') && convex) out.add('directivities');\n    return out;\n  }\n\n  data() {\n    const s = this.state;\n    const sig = JSON.stringify([s.roomType, s.L, s.W, s.H, s.verts, s.src, s.rec, s.order, s.absorption, s.method, s.fmin, s.fmax, s.nFreq]);\n    if (this._sig === sig) return this._data;\n    this._runT = 0; this._cancelRun = true;   // param changed -> revert to fast preview\n    const g = this.geometry();\n    const R = Math.sqrt(Math.max(0, 1 - s.absorption));\n    const N = s.order;\n    let imgs = [];\n    if (s.roomType === 'shoebox') {\n      const mir = (v, m, D) => m * D + ((m % 2 === 0) ? v : D - v);\n      for (let mx = -N; mx <= N; mx++) for (let my = -N; my <= N; my++) for (let mz = -N; mz <= N; mz++) {\n        const o = Math.abs(mx) + Math.abs(my) + Math.abs(mz);\n        if (o === 0 || o > N) continue;\n        imgs.push({ pos: { x: mir(s.src.x, mx, s.L), y: mir(s.src.y, my, s.W), z: mir(s.src.z, mz, s.H) }, order: o });\n      }\n    } else {\n      const seen = new Set(); const key = p => `${Math.round(p.x*20)},${Math.round(p.y*20)},${Math.round(p.z*20)}`;\n      let frontier = [{ pos: s.src, order: 0 }]; seen.add(key(s.src));\n      const maxO = Math.min(N, 2);\n      for (let o = 1; o <= maxO; o++) {\n        let next = [];\n        for (const it of frontier) for (const f of g.faces) {\n          const d = (it.pos.x-f.cen.x)*f.n.x + (it.pos.y-f.cen.y)*f.n.y + (it.pos.z-f.cen.z)*f.n.z;\n          const r = { x: it.pos.x - 2*d*f.n.x, y: it.pos.y - 2*d*f.n.y, z: it.pos.z - 2*d*f.n.z };\n          const k = key(r); if (seen.has(k)) continue; seen.add(k);\n          const im = { pos: r, order: o }; imgs.push(im); next.push(im);\n          if (next.length > 60) break;\n        }\n        frontier = next;\n      }\n    }\n    const all = [{ pos: s.src, order: 0 }, ...imgs];\n    const dist = p => Math.hypot(p.x - s.rec.x, p.y - s.rec.y, p.z - s.rec.z);\n    let taps = all.map(it => { const d = dist(it.pos); return { t: d / this.C, a: Math.pow(R, it.order) / Math.max(0.4, d), o: it.order, p: it.pos }; });\n    taps.sort((p, q) => p.t - q.t);\n    const maxT = Math.min(0.13, Math.max(0.02, taps[tap
